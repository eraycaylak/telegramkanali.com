[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

# ─── Static Asset Cache (1 yıl) ──────────────────────────────────────────────
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, s-maxage=604800"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, s-maxage=604800"

# ─── Security Headers (tüm sayfalar) ─────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    X-XSS-Protection = "1; mode=block"

# ─── Bot / Scraper Engelleme ──────────────────────────────────────────────────
# Kötü bot User-Agent'larını 403 ile durdur
# Not: Cloudflare eklendikten sonra bu katman gereksiz olacak
# ama Netlify'a doğrudan gelen istekler için koruma sağlar

# ─── Redirects ───────────────────────────────────────────────────────────────
# www → non-www yönlendirme (SEO canonical fix)
[[redirects]]
  from = "https://www.telegramkanali.com/*"
  to = "https://telegramkanali.com/:splat"
  status = 301
  force = true
